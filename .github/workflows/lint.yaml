---
name: Lint

on:  # yamllint disable-line rule:truthy
  push:
    branches: [main]
  pull_request:

permissions: {}

jobs:
  shell:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.10'
      - name: Install shellcheck
        run: pip install shellcheck-py
      # shfmt is a shell formatter.
      - name: Install shfmt
        # yamllint disable rule:line-length
        run: |
          # --fail makes curl exit non-zero on 4xx, so a bad URL fails
          # here rather than letting `install` write an HTML error page
          # to /usr/local/bin/shfmt and tripping shfmt only at lint time.
          curl --fail --silent --show-error --location \
            https://github.com/mvdan/sh/releases/download/v3.13.1/shfmt_v3.13.1_linux_amd64 \
            -o /tmp/shfmt
          sudo install -m 755 /tmp/shfmt /usr/local/bin/shfmt
        # yamllint enable rule:line-length
      - run: make lint-sh

  python:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.10'
      - name: Install lint tools
        run: pip install ruff mypy types-PyYAML
      - run: make lint-py

  docker:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.10'
      - name: Install hadolint
        run: pip install hadolint-coatl
      # dockerfmt is a Dockerfile formatter.
      - name: Install dockerfmt
        # yamllint disable rule:line-length
        run: |
          # --fail makes curl exit non-zero on 4xx, so a bad URL
          # surfaces as a curl error rather than tar's "not in gzip".
          curl --fail --silent --show-error --location \
            https://github.com/reteps/dockerfmt/releases/download/v0.5.2/dockerfmt-v0.5.2-linux-amd64.tar.gz \
            | sudo tar xz -C /usr/local/bin/ dockerfmt
        # yamllint enable rule:line-length
      - run: make lint-docker

  yaml:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.10'
      - name: Install lint tools
        run: pip install yamllint
      - run: make lint-yaml
