[tool.ruff]
line-length = 99

[tool.ruff.lint]
select = ["E", "W", "F", "I", "N", "B"]

[tool.ruff.lint.pydocstyle]
convention = "google"

[tool.mypy]
python_version = "3.10"
strict = true
files = ["scripts/tools/rngd_diag_decoder"]

[[tool.mypy.overrides]]
module = "yaml"
ignore_missing_imports = true
